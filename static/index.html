<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f6;
    --bg-warm: #f5f0ea;
    --bg-card: #ffffff;
    --bg-hover: #f8f5f0;
    --bg-code: #f7f5f2;
    --border: #e8e2d9;
    --border-light: #f0ebe4;
    --border-active: #d97757;
    --text-primary: #1a1614;
    --text-secondary: #57534e;
    --text-muted: #a8a29e;
    --text-faint: #c7c2bc;
    --accent: #d97757;
    --accent-light: rgba(217,119,87,0.08);
    --accent-border: rgba(217,119,87,0.2);
    --green: #16a34a;
    --green-light: rgba(22,163,74,0.06);
    --green-border: rgba(22,163,74,0.15);
    --orange: #ca8a04;
    --red: #dc2626;
    --purple: #7c3aed;
    --purple-light: rgba(124,58,237,0.06);
    --purple-border: rgba(124,58,237,0.12);
    --cyan: #0891b2;
    --cyan-light: rgba(8,145,178,0.05);
    --cyan-border: rgba(8,145,178,0.15);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ====== HEADER ====== */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(250,249,246,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 100;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.3px;
    color: var(--text-primary);
  }
  .header-sub {
    font-size: 13px; font-weight: 400; color: var(--text-muted);
    margin-left: 2px;
  }
  .header-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .header-stat {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-stat .value { color: var(--text-primary); font-weight: 600; }
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); display: inline-block;
    flex-shrink: 0;
  }
  .conn-dot.off { background: var(--red); }
  .new-session-btn {
    padding: 7px 16px; border-radius: 8px; border: 1px solid var(--accent-border);
    background: var(--accent-light); color: var(--accent); cursor: pointer;
    font-size: 13px; font-family: var(--font); font-weight: 600;
    transition: all 0.15s ease; margin-left: 12px;
  }
  .new-session-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ====== MODAL ====== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow-lg);
    width: 480px; max-width: 92vw; max-height: 90vh; overflow-y: auto;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 0; font-size: 17px; font-weight: 600; color: var(--text-primary);
  }
  .modal-header h2 { font-size: 17px; margin: 0; }
  .modal-close {
    background: none; border: none; font-size: 22px; cursor: pointer;
    color: var(--text-muted); padding: 0 4px; line-height: 1;
  }
  .modal-close:hover { color: var(--text-primary); }
  .modal-body { padding: 20px 24px; }
  .modal-label {
    display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 14px;
  }
  .modal-label:first-child { margin-top: 0; }
  .modal-select, .modal-textarea {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; font-family: var(--font); background: var(--bg); color: var(--text-primary);
    outline: none; transition: border-color 0.15s;
  }
  .modal-select:focus, .modal-textarea:focus { border-color: var(--accent); }
  .modal-textarea { resize: vertical; min-height: 80px; font-family: var(--mono); font-size: 12.5px; }
  .modal-footer {
    display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px 20px;
  }
  .modal-cancel {
    padding: 8px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer;
    font-size: 13px; font-family: var(--font); font-weight: 500;
  }
  .modal-cancel:hover { background: var(--bg-warm); }
  .modal-submit {
    padding: 8px 22px; border-radius: var(--radius-sm); border: none;
    background: var(--accent); color: #fff; cursor: pointer;
    font-size: 13px; font-family: var(--font); font-weight: 600;
  }
  .modal-submit:hover { opacity: 0.9; }
  .modal-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ====== LAYOUT ====== */
  .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); margin-bottom: 16px; font-weight: 600;
  }

  /* ====== MACHINE TABS ====== */
  .machine-tabs { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
  .machine-tab {
    padding: 7px 18px; border-radius: 100px; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer;
    font-size: 13px; font-family: var(--font); font-weight: 500;
    transition: all 0.15s ease;
  }
  .machine-tab:hover { border-color: var(--text-muted); color: var(--text-primary); background: var(--bg-warm); }
  .machine-tab.active { background: var(--text-primary); border-color: var(--text-primary); color: #fff; }
  .machine-tab .ct { margin-left: 3px; opacity: 0.6; }

  /* ====== ACTIVE PANELS ====== */
  .active-panels { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .active-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .active-panel:hover { box-shadow: var(--shadow); border-color: var(--accent-border); }
  .active-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent 60%);
    opacity: 0.6;
  }
  .ap-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .ap-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    animation: pulse 2.5s ease-in-out infinite; flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(22,163,74,0.3); }
    50% { box-shadow: 0 0 0 5px rgba(22,163,74,0); }
  }
  .ap-project { font-weight: 600; font-size: 15px; color: var(--text-primary); }
  .ap-machine {
    font-size: 11px; color: var(--text-muted); font-weight: 500;
  }
  .ap-branch { color: var(--accent); font-size: 13px; font-weight: 500; }
  .ap-task {
    font-size: 13.5px; color: var(--text-secondary); margin-bottom: 16px;
    line-height: 1.5; max-height: 3em; overflow: hidden;
  }
  .ap-metrics {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px;
  }
  .ap-metric { text-align: center; }
  .ap-metric .num {
    font-size: 18px; font-weight: 700; color: var(--text-primary);
    letter-spacing: -0.5px;
  }
  .ap-metric .lbl {
    font-size: 10px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 500;
  }
  .ap-tools { display: flex; gap: 5px; flex-wrap: wrap; }
  .ap-tool {
    font-size: 11px; padding: 3px 10px; border-radius: 100px;
    background: var(--bg-warm); color: var(--text-secondary);
    border: 1px solid var(--border-light);
    font-weight: 500; font-family: var(--font);
  }
  .ap-tool.latest {
    background: var(--green-light); color: var(--green);
    border-color: var(--green-border);
  }

  /* Waiting-for-user indicator */
  .ap-waiting {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; margin-bottom: 14px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    animation: waiting-pulse 2s ease-in-out infinite;
  }
  .ap-waiting.question {
    background: var(--cyan-light); border: 1px solid var(--cyan-border); color: var(--cyan);
  }
  .ap-waiting.plan_approval {
    background: var(--accent-light); border: 1px solid var(--accent-border); color: var(--accent);
  }
  .ap-waiting.plan_mode {
    background: var(--accent-light); border: 1px solid var(--accent-border); color: var(--accent);
  }
  .ap-waiting.permission {
    background: rgba(202,138,4,0.06); border: 1px solid rgba(202,138,4,0.15); color: var(--orange);
  }
  .ap-waiting-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
    animation: waiting-blink 1.2s ease-in-out infinite;
  }
  @keyframes waiting-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes waiting-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    50% { box-shadow: 0 0 0 3px rgba(0,0,0,0.03); }
  }

  /* ====== RECONNECT ====== */
  .reconnect-banner {
    position: fixed; top: 0; left: 0; right: 0; background: var(--red);
    color: #fff; text-align: center; padding: 6px; font-size: 13px;
    z-index: 200; display: none; font-weight: 500;
  }
  .reconnect-banner.visible { display: block; }

  .empty-state {
    text-align: center; padding: 80px 20px; color: var(--text-muted);
  }
  .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); font-weight: 600; }
  .empty-state p { font-size: 14px; }

  /* ====== CONVERSATION OVERLAY ====== */
  .conv-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: var(--bg);
    display: none; flex-direction: column;
  }
  .conv-overlay.open { display: flex; }
  .conv-header {
    padding: 14px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    background: rgba(250,249,246,0.88); backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px); flex-shrink: 0;
  }
  .conv-back {
    background: none; border: 1px solid var(--border); color: var(--text-secondary);
    padding: 6px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
    font-family: var(--font); font-weight: 500;
    transition: all 0.15s ease;
  }
  .conv-back:hover { border-color: var(--text-muted); color: var(--text-primary); background: var(--bg-warm); }
  .conv-title { font-weight: 600; font-size: 15px; color: var(--text-primary); }
  .conv-meta { font-size: 12px; color: var(--text-muted); margin-left: auto; display: flex; gap: 16px; font-weight: 500; }
  .conv-body { flex: 1; overflow-y: auto; padding: 0; }
  .conv-messages { max-width: 800px; margin: 0 auto; padding: 32px; }
  .conv-loading { text-align: center; padding: 80px; color: var(--text-muted); font-size: 14px; }

  /* ====== CONVERSATION MESSAGES ====== */
  .cli-msg { margin-bottom: 24px; }
  .cli-prompt-line {
    display: flex; align-items: flex-start; gap: 12px; margin-bottom: 4px;
  }
  .cli-prompt-marker {
    color: var(--accent); font-weight: 600; font-size: 14px;
    font-family: var(--mono);
    flex-shrink: 0; margin-top: 2px; user-select: none;
  }
  .cli-user-text {
    font-size: 15px; color: var(--text-primary); font-weight: 500;
    line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  }
  .cli-response { padding-left: 28px; margin-top: 8px; }
  .cli-text {
    font-size: 14px; color: var(--text-secondary); line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
  }
  .cli-text code {
    background: var(--bg-code); padding: 2px 6px; border-radius: 4px;
    font-family: var(--mono); font-size: 0.88em;
    border: 1px solid var(--border-light);
  }
  .cli-text pre {
    background: var(--bg-code); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 16px 18px; margin: 10px 0; overflow-x: auto;
    font-family: var(--mono); font-size: 13px;
    line-height: 1.6; color: var(--text-primary);
  }

  /* Tool call blocks */
  .cli-tool {
    margin: 6px 0; border-left: 2px solid var(--border); padding-left: 14px;
  }
  .cli-tool-header {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 4px 0; user-select: none;
  }
  .cli-tool-name {
    font-size: 12px; font-weight: 600; color: var(--purple);
    font-family: var(--mono);
  }
  .cli-tool-toggle {
    font-size: 9px; color: var(--text-muted); transition: transform 0.15s;
  }
  .cli-tool-toggle.open { transform: rotate(90deg); }
  .cli-tool-body { display: none; padding: 6px 0; }
  .cli-tool-body.open { display: block; }
  .cli-tool-input {
    font-size: 12px; color: var(--text-muted);
    font-family: var(--mono);
    white-space: pre-wrap; word-break: break-word;
    line-height: 1.5; max-height: 200px; overflow-y: auto;
  }

  /* Tool result blocks */
  .cli-tool-result {
    margin: 4px 0 6px 0; border-left: 2px solid var(--border-light); padding-left: 14px;
  }
  .cli-tool-result-header {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 3px 0; user-select: none;
  }
  .cli-tool-result-toggle {
    font-size: 9px; color: var(--text-muted); transition: transform 0.15s;
  }
  .cli-tool-result-toggle.open { transform: rotate(90deg); }
  .cli-tool-result-label {
    font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;
  }
  .cli-tool-result-body { display: none; }
  .cli-tool-result-body.open { display: block; }
  .cli-tool-result-content {
    font-size: 12px; color: var(--text-muted);
    font-family: var(--mono);
    white-space: pre-wrap; word-break: break-word;
    line-height: 1.5; max-height: 200px; overflow-y: auto; padding: 4px 0;
  }

  /* Thinking */
  .cli-thinking {
    margin: 8px 0; padding: 10px 14px;
    background: rgba(202,138,4,0.04); border-left: 2px solid var(--orange);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }
  .cli-thinking-label {
    font-size: 11px; color: var(--orange); text-transform: uppercase;
    font-weight: 600; letter-spacing: 0.3px; cursor: pointer;
  }
  .cli-thinking-label::after {
    content: ' (click to expand)'; font-size: 10px; opacity: 0.5; font-weight: 400; text-transform: none; letter-spacing: 0;
  }
  .cli-thinking-text {
    font-size: 13px; color: var(--text-muted); line-height: 1.6;
    white-space: pre-wrap; display: none;
    max-height: 300px; overflow-y: auto; margin-top: 6px;
  }
  .cli-thinking-text.open { display: block; }

  .cli-msg-meta {
    font-size: 11px; color: var(--text-faint); margin-top: 4px; padding-left: 28px; font-weight: 500;
  }
  .cli-divider { border: none; border-top: 1px solid var(--border-light); margin: 24px 0; }

  .conv-scroll-btn {
    position: fixed; bottom: 28px; right: 28px;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--text-primary); color: #fff; border: none;
    cursor: pointer; font-size: 18px; z-index: 310;
    display: none; align-items: center; justify-content: center;
    box-shadow: var(--shadow-lg);
    transition: opacity 0.15s ease;
  }
  .conv-scroll-btn:hover { opacity: 0.85; }
  .conv-scroll-btn.visible { display: flex; }

  .cli-tool + .cli-tool { margin-top: 2px; }
  .cli-tool-result + .cli-tool-result { margin-top: 2px; }

  /* ====== PLAN BLOCKS ====== */
  .cli-plan {
    margin: 12px 0; padding: 16px 20px;
    background: var(--accent-light); border: 1px solid var(--accent-border);
    border-radius: var(--radius);
  }
  .cli-plan-header {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
  }
  .cli-plan-badge {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    padding: 3px 10px; border-radius: 100px;
    background: var(--accent); color: #fff;
  }
  .cli-plan-toggle { font-size: 9px; color: var(--text-muted); transition: transform 0.15s; }
  .cli-plan-toggle.open { transform: rotate(90deg); }
  .cli-plan-body { display: none; margin-top: 12px; }
  .cli-plan-body.open { display: block; }
  .cli-plan-content {
    font-size: 14px; color: var(--text-secondary); line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
  }

  /* ====== ASK USER QUESTION ====== */
  .cli-question {
    margin: 12px 0; padding: 16px 20px;
    background: var(--cyan-light); border: 1px solid var(--cyan-border);
    border-radius: var(--radius);
  }
  .cli-question-text {
    font-size: 14px; color: var(--text-primary); font-weight: 500; margin-bottom: 12px;
    line-height: 1.5;
  }
  .cli-question-option {
    padding: 8px 14px; margin: 6px 0;
    border-radius: var(--radius-sm); font-size: 13px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); transition: all 0.15s ease;
  }
  .cli-question-option.selected {
    background: rgba(8,145,178,0.08); border-color: var(--cyan);
    color: var(--cyan); font-weight: 600;
  }
  .cli-question-option .opt-label { font-weight: 500; }
  .cli-question-option .opt-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }

  /* ====== SYSTEM MESSAGES ====== */
  .cli-system {
    margin: 10px 0; padding: 8px 14px;
    font-size: 12px; color: var(--text-muted); text-align: center;
    font-weight: 500;
  }
  .cli-system.error {
    color: var(--red); background: rgba(220,38,38,0.04);
    border: 1px solid rgba(220,38,38,0.12); border-radius: var(--radius-sm);
    text-align: left; font-size: 13px; font-weight: 400;
  }

  /* ====== BASH OUTPUT ====== */
  .cli-bash-output {
    margin: 6px 0; padding: 12px 16px;
    background: var(--bg-code); border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: var(--mono); font-size: 12px;
    color: var(--text-secondary); line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
    max-height: 300px; overflow-y: auto;
  }
  .cli-bash-output .stderr { color: var(--red); }

  /* ====== FILE PATH ====== */
  .cli-file-path {
    font-size: 12px; color: var(--accent);
    font-family: var(--mono);
    font-weight: 500;
  }

  /* ====== DIFF VIEW ====== */
  .cli-diff { margin: 6px 0; }
  .cli-diff pre {
    font-size: 12px; line-height: 1.5; margin: 0; padding: 12px 16px;
    background: var(--bg-code); border: 1px solid var(--border); border-radius: var(--radius-sm);
    overflow-x: auto; max-height: 300px; overflow-y: auto;
  }
  .cli-diff .diff-del { color: var(--red); }
  .cli-diff .diff-add { color: var(--green); }

  /* ====== AGENT RESULT ====== */
  .cli-agent-result {
    margin: 6px 0; padding: 10px 14px;
    background: var(--purple-light); border: 1px solid var(--purple-border);
    border-radius: var(--radius-sm); font-size: 13px;
    color: var(--text-secondary); line-height: 1.6;
  }
  .cli-agent-status {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .cli-agent-status.completed { color: var(--green); }
  .cli-agent-status.error { color: var(--red); }

  /* ====== SESSION CONTROL INPUT BAR ====== */
  .conv-input-bar {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 14px 28px;
    background: var(--bg-card);
    display: none;
  }
  .conv-input-bar.visible { display: block; }
  .conv-input-row {
    max-width: 800px; margin: 0 auto;
    display: flex; gap: 10px; align-items: flex-end;
  }
  .conv-input-field {
    flex: 1; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; font-family: var(--font); color: var(--text-primary);
    background: var(--bg); resize: none; outline: none;
    line-height: 1.5; min-height: 42px; max-height: 120px;
  }
  .conv-input-field:focus { border-color: var(--accent); }
  .conv-input-field::placeholder { color: var(--text-muted); }
  .conv-send-btn {
    padding: 10px 20px; border-radius: var(--radius-sm);
    background: var(--accent); color: #fff; border: none;
    font-size: 14px; font-family: var(--font); font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.15s;
  }
  .conv-send-btn:hover { opacity: 0.85; }
  .conv-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .conv-input-actions {
    max-width: 800px; margin: 0 auto 10px;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .conv-action-btn {
    padding: 7px 16px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg);
    font-size: 13px; font-family: var(--font); font-weight: 500;
    color: var(--text-secondary); cursor: pointer;
    transition: all 0.15s;
  }
  .conv-action-btn:hover { border-color: var(--text-muted); color: var(--text-primary); background: var(--bg-warm); }
  .conv-action-btn.primary {
    background: var(--green); color: #fff; border-color: var(--green);
  }
  .conv-action-btn.primary:hover { opacity: 0.85; }
  .conv-action-btn.danger {
    color: var(--red); border-color: rgba(220,38,38,0.3);
  }
  .conv-action-btn.danger:hover { background: rgba(220,38,38,0.06); }
  .conv-action-btn.takeover {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .conv-action-btn.takeover:hover { opacity: 0.85; }
  .conv-action-btn.plan-mode {
    background: var(--purple); color: #fff; border-color: var(--purple);
  }
  .conv-action-btn.plan-mode:hover { opacity: 0.85; }
  .conv-managed-status {
    font-size: 12px; color: var(--text-muted); font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .conv-managed-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
  }
  .conv-managed-dot.waiting { background: var(--orange); }
  .conv-managed-dot.stopped { background: var(--text-muted); }
  .conv-managed-dot.error { background: var(--red); }

  /* ====== ACTIVE PANEL ACTION BUTTONS ====== */
  .ap-actions {
    display: flex; gap: 6px; margin-top: 14px;
  }
  .ap-action-btn {
    padding: 5px 12px; border-radius: 100px;
    border: 1px solid var(--border); background: var(--bg);
    font-size: 11px; font-family: var(--font); font-weight: 500;
    color: var(--text-secondary); cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; gap: 4px;
  }
  .ap-action-btn:hover { border-color: var(--text-muted); color: var(--text-primary); background: var(--bg-warm); }
  .ap-action-btn.stop { color: var(--red); border-color: rgba(220,38,38,0.3); }
  .ap-action-btn.stop:hover { background: rgba(220,38,38,0.06); }
  .ap-action-btn.answer {
    color: var(--cyan); border-color: var(--cyan-border);
  }
  .ap-action-btn.answer:hover { background: var(--cyan-light); }
  .ap-action-btn.resume {
    color: var(--accent); border-color: var(--accent-border);
  }
  .ap-action-btn.resume:hover { background: var(--accent-light); }

  /* ====== INACTIVE SESSIONS ====== */
  .inactive-section { margin-top: 32px; }
  .inactive-header {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 10px 0; user-select: none;
    color: var(--text-secondary); font-size: 14px; font-weight: 600;
  }
  .inactive-header:hover { color: var(--text-primary); }
  .inactive-chevron {
    font-size: 10px; transition: transform 0.2s; color: var(--text-muted);
  }
  .inactive-chevron.open { transform: rotate(90deg); }
  .inactive-panels {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px;
  }
  .inactive-panel {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    cursor: pointer; transition: all 0.15s;
    opacity: 0.75; box-shadow: var(--shadow-sm);
  }
  .inactive-panel:hover { opacity: 1; border-color: var(--border-active); box-shadow: var(--shadow); }
  .inactive-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted);
    flex-shrink: 0;
  }
  .inactive-show-more {
    display: block; margin: 14px auto 0; padding: 6px 20px;
    border: 1px solid var(--border); border-radius: 100px;
    background: var(--bg); color: var(--text-secondary);
    font-size: 12px; font-family: var(--font); font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .inactive-show-more:hover { border-color: var(--text-muted); background: var(--bg-warm); }

  /* ====== RESPONSIVE ====== */
  @media (max-width: 640px) {
    .header { flex-direction: column; gap: 10px; align-items: flex-start; padding: 14px 20px; }
    .container { padding: 20px; }
    .active-panels { grid-template-columns: 1fr; }
    .conv-messages { padding: 16px 20px; }
    .cli-response { padding-left: 16px; }
    .conv-input-bar { padding: 10px 16px; }
  }
</style>
</head>
<body>

<div class="reconnect-banner" id="reconnect-banner">Disconnected. Reconnecting...</div>

<!-- Conversation overlay -->
<div class="conv-overlay" id="conv-overlay">
  <div class="conv-header">
    <button class="conv-back" onclick="closeConversation()">&#8592; Back <span style="opacity:0.4;font-size:10px;margin-left:4px">ESC</span></button>
    <span class="conv-title" id="conv-title"></span>
    <div class="conv-meta" id="conv-meta"></div>
  </div>
  <div class="conv-body" id="conv-body">
    <div class="conv-messages" id="conv-messages"></div>
  </div>
  <div class="conv-input-bar" id="conv-input-bar">
    <div class="conv-input-actions" id="conv-input-actions"></div>
    <div class="conv-input-row">
      <textarea class="conv-input-field" id="conv-input-field" rows="1" placeholder="Send a message..."></textarea>
      <button class="conv-send-btn" id="conv-send-btn" onclick="sendConvMessage()">Send</button>
    </div>
  </div>
  <button class="conv-scroll-btn" id="conv-scroll-btn" onclick="scrollConvBottom()" title="Scroll to bottom">&#8595;</button>
</div>

<div class="header">
  <h1><span class="conn-dot" id="conn-dot"></span> Claude Pulse <span class="header-sub">live session monitor</span></h1>
  <div class="header-stats" id="header-stats"></div>
  <button class="new-session-btn" onclick="openNewSessionModal()">+ New Session</button>
</div>

<!-- New Session Modal -->
<div class="modal-overlay" id="new-session-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h2>New Session</h2>
      <button class="modal-close" onclick="closeNewSessionModal()">&times;</button>
    </div>
    <div class="modal-body">
      <label class="modal-label">Project</label>
      <select class="modal-select" id="new-session-project">
        <option value="">Loading projects...</option>
      </select>
      <label class="modal-label">Machine</label>
      <select class="modal-select" id="new-session-machine">
        <option value="local">local</option>
      </select>
      <label class="modal-label">Initial Prompt</label>
      <textarea class="modal-textarea" id="new-session-prompt" rows="4" placeholder="What should Claude work on?"></textarea>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeNewSessionModal()">Cancel</button>
      <button class="modal-submit" id="new-session-submit" onclick="submitNewSession()">Launch</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="machine-tabs" id="machine-tabs"></div>
  <div id="active-section"></div>
  <div id="inactive-section"></div>
  <div id="empty-state" class="empty-state" style="display:none">
    <h3>No sessions found</h3>
    <p>Start a Claude Code session to see it here</p>
  </div>
</div>

<script>
// --- State ---
let sessions = [];
let stats = {};
let machines = [];
let currentFilter = 'all';
let ws = null;
let currentViewedSessionId = null;
let convRefreshTimer = null;
let managedStatuses = {};  // {session_id: status}
let managedWaitingFor = {};  // {session_id: waiting_for}
let _openPanels = new Set();  // deterministic panel IDs that are currently open

// --- Helpers ---
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function fmtDur(sec) {
  if (!sec || sec <= 0) return '0s';
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60);
  if (h > 0) return h+'h '+m+'m';
  if (m > 0) return m+'m '+s+'s';
  return s+'s';
}
function fmtAgo(ts) {
  if (!ts) return '';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return Math.floor(diff)+'s ago';
  if (diff < 3600) return Math.floor(diff/60)+'m ago';
  if (diff < 86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}
function shortModel(m) {
  if (!m) return '';
  return m.replace('claude-','').replace(/-202\d+$/,'');
}
function getFiltered() {
  if (currentFilter === 'all') return [...sessions];
  return sessions.filter(s => (s.machine||'local') === currentFilter);
}

// --- Render ---
function renderAll() {
  renderHeaderStats();
  renderMachineTabs();
  renderActivePanels();
  renderInactivePanels();
}

function renderHeaderStats() {
  const el = document.getElementById('header-stats');
  const active = sessions.filter(s => s.is_active);
  const total = sessions.length;
  el.innerHTML = `
    <div class="header-stat"><span class="value">${active.length}</span> active</div>
    <div class="header-stat"><span class="value">${total}</span> total</div>`;
}

function renderMachineTabs() {
  const el = document.getElementById('machine-tabs');
  const mm = {};
  sessions.forEach(s => { const m = s.machine||'local'; mm[m] = (mm[m]||0)+1; });
  if (Object.keys(mm).length <= 1) { el.innerHTML = ''; return; }
  let h = `<button class="machine-tab ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">All<span class="ct"> (${sessions.length})</span></button>`;
  Object.keys(mm).sort().forEach(m => {
    h += `<button class="machine-tab ${currentFilter===m?'active':''}" onclick="setFilter('${esc(m)}')">${esc(m)}<span class="ct"> (${mm[m]})</span></button>`;
  });
  el.innerHTML = h;
}

// ====== ACTIVE AGENT PANELS ======
// Stable ordering: session IDs are sorted once on initial load / filter change.
// New sessions are appended; removed sessions are pruned. Order never shuffles mid-session.
let _panelOrder = [];  // ordered list of session_ids

function renderActivePanels() {
  const el = document.getElementById('active-section');
  const emptyEl = document.getElementById('empty-state');
  const filtered = getFiltered();
  const active = filtered.filter(s => s.is_active);
  const inactive = filtered.filter(s => !s.is_active);
  if (active.length === 0) {
    _panelOrder = [];
    el.innerHTML = '';
    // Only show empty state if there are also no inactive sessions
    emptyEl.style.display = inactive.length === 0 ? '' : 'none';
    return;
  }
  emptyEl.style.display = 'none';

  // Build set of currently active session IDs
  const activeIds = new Set(active.map(s => s.session_id));

  // Prune sessions that are no longer active
  _panelOrder = _panelOrder.filter(id => activeIds.has(id));

  // Append any new sessions (sorted by timestamp) at the end
  const existing = new Set(_panelOrder);
  const newSessions = active.filter(s => !existing.has(s.session_id));
  newSessions.sort((a,b) => new Date(b.last_timestamp||0) - new Date(a.last_timestamp||0));
  for (const s of newSessions) _panelOrder.push(s.session_id);

  // If order was empty (first load), sort everything
  if (_panelOrder.length === active.length && newSessions.length === active.length) {
    _panelOrder = active
      .slice()
      .sort((a,b) => new Date(b.last_timestamp||0) - new Date(a.last_timestamp||0))
      .map(s => s.session_id);
  }

  // Render in stable order
  const sessionMap = {};
  active.forEach(s => { sessionMap[s.session_id] = s; });
  const ordered = _panelOrder.map(id => sessionMap[id]).filter(Boolean);

  el.innerHTML = `
    <div class="section-label">Active Agents (${ordered.length})</div>
    <div class="active-panels">${ordered.map(renderActivePanel).join('')}</div>`;
}

function renderActivePanel(s) {
  const tools = s.recent_tools || [];
  const latest = tools.length > 0 ? tools[tools.length-1] : null;
  const toolCounts = {};
  tools.forEach(t => { toolCounts[t] = (toolCounts[t]||0)+1; });
  let toolsHtml = '';
  const uniqueTools = [...new Set(tools.slice(-12).reverse())].slice(0, 8);
  uniqueTools.forEach(t => {
    const isLatest = t === latest;
    toolsHtml += `<span class="ap-tool ${isLatest?'latest':''}">${esc(t)}${toolCounts[t]>1?' x'+toolCounts[t]:''}</span>`;
  });
  let actionsHtml = '';
  actionsHtml = '<div class="ap-actions">';
  if (s.waiting_for) {
    actionsHtml += `<button class="ap-action-btn answer" onclick="event.stopPropagation();openConversation('${esc(s.session_id)}')">${s.waiting_for === 'plan_approval' ? 'Review Plan' : 'Answer'}</button>`;
  }
  actionsHtml += `<button class="ap-action-btn" onclick="event.stopPropagation();interruptSession('${esc(s.session_id)}')" title="Interrupt">Interrupt</button>`;
  actionsHtml += `<button class="ap-action-btn stop" onclick="event.stopPropagation();stopSession('${esc(s.session_id)}')" title="Stop">Stop</button>`;
  actionsHtml += '</div>';
  return `
    <div class="active-panel" onclick="openConversation('${esc(s.session_id)}')">
      <div class="ap-header">
        <span class="ap-dot"></span>
        <span class="ap-project">${esc(s.project_name||'unknown')}</span>
        <span class="ap-machine">[${esc(s.machine||'local')}]</span>
        <span class="ap-branch">${esc(s.git_branch||'')}</span>
      </div>
      <div class="ap-task">${esc(s.last_user_message || s.first_user_message || 'Command-line session')}</div>
      ${renderWaitingBadge(s)}
      <div class="ap-metrics">
        <div class="ap-metric"><div class="num">${s.message_count||0}</div><div class="lbl">messages</div></div>
        <div class="ap-metric"><div class="num">${fmtDur(s.duration_seconds)}</div><div class="lbl">duration</div></div>
      </div>
      ${toolsHtml ? '<div class="ap-tools">'+toolsHtml+'</div>' : ''}
      ${actionsHtml}
    </div>`;
}

function renderWaitingBadge(s) {
  if (!s.waiting_for) return '';
  const labels = {
    question: 'Waiting for your answer',
    plan_approval: 'Plan awaiting approval',
    plan_mode: 'Requesting plan mode',
    permission: `Requesting permission for ${s.waiting_tool || 'tool'}`,
  };
  const label = labels[s.waiting_for] || 'Waiting for input';
  return `<div class="ap-waiting ${s.waiting_for}">
    <span class="ap-waiting-dot"></span>
    <span>${esc(label)}</span>
  </div>`;
}

function setFilter(f) { currentFilter = f; _panelOrder = []; renderAll(); }

// ====== INACTIVE SESSION PANELS ======
let _inactiveExpanded = false;
let _inactiveShowCount = 20;

function renderInactivePanels() {
  const el = document.getElementById('inactive-section');
  const inactive = getFiltered().filter(s => !s.is_active);
  if (inactive.length === 0) { el.innerHTML = ''; return; }

  // Sort by last_timestamp descending (most recent first)
  inactive.sort((a, b) => new Date(b.last_timestamp||0) - new Date(a.last_timestamp||0));

  const chevronCls = _inactiveExpanded ? 'inactive-chevron open' : 'inactive-chevron';
  let h = `<div class="inactive-section">
    <div class="inactive-header" onclick="_inactiveExpanded=!_inactiveExpanded;renderInactivePanels()">
      <span class="${chevronCls}">&#9654;</span>
      <span>Recent Sessions (${inactive.length})</span>
    </div>`;

  if (_inactiveExpanded) {
    const visible = inactive.slice(0, _inactiveShowCount);
    h += `<div class="inactive-panels">${visible.map(renderInactivePanel).join('')}</div>`;
    if (inactive.length > _inactiveShowCount) {
      h += `<button class="inactive-show-more" onclick="event.stopPropagation();_inactiveShowCount+=20;renderInactivePanels()">Show more (${inactive.length - _inactiveShowCount} remaining)</button>`;
    }
  }

  h += '</div>';
  el.innerHTML = h;
}

function renderInactivePanel(s) {
  const ago = fmtAgo(s.last_timestamp);
  return `
    <div class="inactive-panel" onclick="openConversation('${esc(s.session_id)}')">
      <div class="ap-header">
        <span class="inactive-dot"></span>
        <span class="ap-project">${esc(s.project_name||'unknown')}</span>
        <span class="ap-machine">[${esc(s.machine||'local')}]</span>
        <span class="ap-branch">${esc(s.git_branch||'')}</span>
      </div>
      <div class="ap-task">${esc(s.last_user_message || s.first_user_message || 'Command-line session')}</div>
      <div class="ap-metrics">
        <div class="ap-metric"><div class="num">${s.message_count||0}</div><div class="lbl">messages</div></div>
        <div class="ap-metric"><div class="num">${ago || 'n/a'}</div><div class="lbl">last active</div></div>
      </div>
      <div class="ap-actions">
        <button class="ap-action-btn resume" onclick="event.stopPropagation();resumeSession('${esc(s.session_id)}')">Resume</button>
      </div>
    </div>`;
}

async function resumeSession(sessionId) {
  if (!confirm('Resume this session from the dashboard?')) return;
  try {
    const resp = await fetch(`/api/sessions/${sessionId}/take-over`, {method: 'POST'});
    const data = await resp.json();
    if (resp.ok) {
      managedStatuses[sessionId] = data.managed_status;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'subscribe_managed', session_id: sessionId}));
      }
      openConversation(sessionId);
    } else {
      alert('Failed to resume session: ' + (data.detail || 'unknown error'));
    }
  } catch (e) {
    alert('Failed to resume session: ' + e.message);
  }
}

// --- WebSocket ---
function connectWs() {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => {
    document.getElementById('conn-dot').classList.remove('off');
    document.getElementById('reconnect-banner').classList.remove('visible');
    if (currentViewedSessionId && managedStatuses[currentViewedSessionId]
        && managedStatuses[currentViewedSessionId] !== 'stopped') {
      ws.send(JSON.stringify({type: 'subscribe_managed', session_id: currentViewedSessionId}));
    }
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch(msg.type) {
      case 'initial_state':
        sessions = msg.sessions||[]; stats = msg.stats||{}; machines = msg.machines||[];
        if (msg.managed_statuses) {
          managedStatuses = {};
          managedWaitingFor = {};
          for (const [sid, val] of Object.entries(msg.managed_statuses)) {
            if (typeof val === 'string') {
              managedStatuses[sid] = val;
            } else {
              managedStatuses[sid] = val.status || '';
              managedWaitingFor[sid] = val.waiting_for || '';
            }
          }
        }
        renderAll(); break;
      case 'session_update':
        if (msg.data) {
          const i = sessions.findIndex(s => s.session_id===msg.data.session_id);
          if (i >= 0) sessions[i] = msg.data; else sessions.push(msg.data);
          renderAll();
          if (currentViewedSessionId && msg.data.session_id === currentViewedSessionId) {
            refreshConversation(currentViewedSessionId);
          }
        } break;
      case 'stats_update':
        if (msg.data) { stats = msg.data; renderHeaderStats(); } break;
      case 'machine_report':
        if (msg.stats) stats = msg.stats; renderAll(); break;
      case 'managed_status':
        if (msg.session_id) {
          managedStatuses[msg.session_id] = msg.status;
          managedWaitingFor[msg.session_id] = msg.waiting_for || '';
          if (currentViewedSessionId === msg.session_id) {
            updateConvInputBar();
            // Refresh on waiting (turn complete) and stopped
            if (msg.status === 'waiting' || msg.status === 'stopped') {
              setTimeout(() => {
                _lastMsgCount = -1;
                refreshConversation(msg.session_id);
              }, msg.status === 'waiting' ? 800 : 0);
            }
          }
          renderActivePanels();
          renderInactivePanels();
        } break;
      case 'managed_output':
        // When viewing this session, trigger a conversation refresh
        // On result events, delay slightly to ensure JSONL is flushed
        if (currentViewedSessionId === msg.session_id) {
          const evt = msg.event || {};
          if (evt.type === 'result') {
            setTimeout(() => {
              _lastMsgCount = -1;
              refreshConversation(msg.session_id);
            }, 600);
          } else {
            _lastMsgCount = -1;
            refreshConversation(msg.session_id);
          }
        } break;
    }
  };
  ws.onclose = () => {
    document.getElementById('conn-dot').classList.add('off');
    document.getElementById('reconnect-banner').classList.add('visible');
    setTimeout(connectWs, 3000);
  };
  ws.onerror = () => ws.close();
}

setInterval(() => { renderActivePanels(); renderInactivePanels(); }, 15000);
setInterval(() => { if (ws&&ws.readyState===WebSocket.OPEN) ws.send('ping'); }, 30000);
connectWs();

// Deep-link: open conversation from URL hash
function checkHash() {
  const h = location.hash;
  if (h && h.startsWith('#session=')) {
    const sid = h.slice(9);
    if (sid && sessions.length > 0) openConversation(sid);
  }
}
window.addEventListener('hashchange', checkHash);
// Check on initial load after WS connects
setTimeout(checkHash, 1500);

// ====== CONVERSATION VIEW ======
async function openConversation(sessionId) {
  const overlay = document.getElementById('conv-overlay');
  const titleEl = document.getElementById('conv-title');
  const metaEl = document.getElementById('conv-meta');
  const msgEl = document.getElementById('conv-messages');

  currentViewedSessionId = sessionId;
  _openPanels = new Set();

  const s = sessions.find(x => x.session_id === sessionId);
  if (s) {
    titleEl.textContent = (s.project_name || 'Session') + (s.git_branch ? ' (' + s.git_branch + ')' : '');
    metaEl.innerHTML = `
      <span>${s.message_count||0} msgs</span>
      <span>${fmtDur(s.duration_seconds)}</span>
      <span>${(s.models_used||[]).map(shortModel).join(', ')}</span>`;
  } else {
    titleEl.textContent = 'Session';
    metaEl.innerHTML = '';
  }

  msgEl.innerHTML = '<div class="conv-loading">Loading conversation...</div>';
  overlay.classList.add('open');
  _lastMsgCount = s ? s.message_count : 0;

  // Subscribe to managed output if this is a managed session
  if (managedStatuses[sessionId] && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type: 'subscribe_managed', session_id: sessionId}));
  }

  updateConvInputBar();

  try {
    const resp = await fetch(`/api/sessions/${sessionId}/messages`);
    if (!resp.ok) throw new Error('Failed to load');
    const data = await resp.json();
    renderConversation(data.messages, msgEl);
  } catch (e) {
    msgEl.innerHTML = '<div class="conv-loading">Failed to load conversation</div>';
  }

  // Start periodic refresh for active/managed sessions (every 3s)
  clearInterval(convRefreshTimer);
  convRefreshTimer = setInterval(() => {
    const sess = sessions.find(x => x.session_id === sessionId);
    const ms = managedStatuses[sessionId];
    const isManaged = ms && ms !== 'stopped' && ms !== 'error';
    if ((sess && sess.is_active) || isManaged) {
      _lastMsgCount = -1;  // Force bypass debounce for managed sessions
      refreshConversation(sessionId);
    }
  }, 3000);
}

let _lastMsgCount = 0;
let _lastRefreshTime = 0;
async function refreshConversation(sessionId) {
  if (sessionId !== currentViewedSessionId) return;
  const sess = sessions.find(x => x.session_id === sessionId);
  const ms = managedStatuses[sessionId];
  const isManaged = ms && ms !== 'stopped' && ms !== 'error';
  // For managed sessions, always fetch (server has pending messages from output buffer)
  // but throttle to at most once per second to avoid hammering the API.
  if (isManaged) {
    const now = Date.now();
    if (now - _lastRefreshTime < 1000) return;
    _lastRefreshTime = now;
  } else {
    // For regular sessions, only refetch if message count changed.
    if (sess && sess.message_count === _lastMsgCount) return;
  }
  _lastMsgCount = sess ? sess.message_count : 0;

  const msgEl = document.getElementById('conv-messages');
  if (!msgEl) return;
  // Remember scroll position
  const body = document.getElementById('conv-body');
  const wasAtBottom = body && (body.scrollTop + body.clientHeight >= body.scrollHeight - 100);

  try {
    const resp = await fetch(`/api/sessions/${sessionId}/messages`);
    if (!resp.ok) return;
    const data = await resp.json();
    if (sessionId !== currentViewedSessionId) return; // session changed while fetching
    renderConversation(data.messages, msgEl);
    // If user was at bottom, stay at bottom
    if (wasAtBottom && body) body.scrollTop = body.scrollHeight;
  } catch (e) { /* silent */ }
}

function closeConversation() {
  // Unsubscribe from managed output
  if (currentViewedSessionId && managedStatuses[currentViewedSessionId] && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type: 'unsubscribe_managed', session_id: currentViewedSessionId}));
  }
  currentViewedSessionId = null;
  _lastMsgCount = 0;
  clearInterval(convRefreshTimer);
  document.getElementById('conv-overlay').classList.remove('open');
  document.getElementById('conv-scroll-btn').classList.remove('visible');
  document.getElementById('conv-input-bar').classList.remove('visible');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeConversation(); });

})();

}

function renderConversation(messages, container) {
  if (!messages || messages.length === 0) {
    container.innerHTML = '<div class="conv-loading">No messages in this session</div>';
    return;
  }

  // Reverse: most recent first
  const reversed = [...messages].reverse();

  let html = '';
  reversed.forEach((msg, idx) => {
    const msgIdx = messages.length - 1 - idx;  // original message index (stable)
    const prevMsg = reversed[idx - 1];
    const showMeta = msg.role === 'assistant' && (!prevMsg || prevMsg.role === 'user');

    if (msg.role === 'user') {
      if (idx > 0) html += '<hr class="cli-divider">';
      html += renderUserMessage(msg, msgIdx);
    } else if (msg.role === 'assistant') {
      html += renderAssistantMessage(msg, showMeta, msgIdx);
    } else if (msg.role === 'system') {
      html += renderSystemMessage(msg);
    }
  });

  container.innerHTML = html;
  // Restore open panel state
  for (const panelId of _openPanels) {
    const body = document.getElementById(panelId + '-body');
    const toggle = document.getElementById(panelId + '-toggle');
    if (body) body.classList.add('open');
    if (toggle) toggle.classList.add('open');
  }
  container.scrollTop = 0;
}

function renderSystemMessage(msg) {
  let html = '';
  for (const block of (msg.content || [])) {
    if (block.type === 'error') {
      html += `<div class="cli-system error">${esc(block.text)}</div>`;
    } else if (block.type === 'info') {
      html += `<div class="cli-system">${esc(block.text)}</div>`;
    }
  }
  return html;
}

function renderUserMessage(msg, msgIdx) {
  let html = '<div class="cli-msg cli-msg-user">';
  let blockIdx = 0;
  for (const block of (msg.content || [])) {

      html += `<div class="cli-prompt-line">
        <span class="cli-prompt-marker">&gt;</span>
        <span class="cli-user-text">${formatCliText(block.text)}</span>
      </div>`;
    } else if (block.type === 'tool_result') {
      html += renderToolResult(block, msgIdx, blockIdx);

    _openPanels.delete(id);
  }
}
function toggleThinking(id) {

function shortPath(p) {
  if (!p) return '';
  const parts = p.split('/');
  if (parts.length <= 3) return p;
  return '.../' + parts.slice(-3).join('/');
}

function formatCliText(text) {
  if (!text) return '';
  let s = esc(text);
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre>${code}</pre>`);
  s = s.replace(/^### (.+)$/gm, '<strong style="color:var(--text-primary);font-size:13px">$1</strong>');
  s = s.replace(/^## (.+)$/gm, '<strong style="color:var(--text-primary);font-size:14.5px">$1</strong>');
  s = s.replace(/^# (.+)$/gm, '<strong style="color:var(--text-primary);font-size:16px">$1</strong>');
  s = s.replace(/^- (.+)$/gm, '  \u2022 $1');
  s = s.replace(/^(\d+)\. (.+)$/gm, '  $1. $2');
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return s;
}

// ====== SESSION CONTROL ======

async function takeOverSession(sessionId) {
  const s = sessions.find(x => x.session_id === sessionId);
  const isActive = s && s.is_active;
  const msg = isActive
    ? 'This will kill the terminal session and take it over from the dashboard. Continue?'
    : 'This will resume the inactive session from the dashboard. Continue?';
  if (!confirm(msg)) return;
  try {
    const resp = await fetch(`/api/sessions/${sessionId}/take-over`, {method: 'POST'});
    const data = await resp.json();
    if (resp.ok) {
      managedStatuses[sessionId] = data.managed_status;
      managedWaitingFor[sessionId] = data.waiting_for || '';
      // Subscribe to managed output
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'subscribe_managed', session_id: sessionId}));
      }
      updateConvInputBar();
    } else {
      alert(data.detail || 'Failed to take over session');
    }
  } catch (e) {
    alert('Failed to take over session: ' + e.message);
  }
}

async function sendConvMessage() {
  const field = document.getElementById('conv-input-field');
  const text = field.value.trim();
  if (!text || !currentViewedSessionId) return;

  const ms = managedStatuses[currentViewedSessionId];
  if (!ms || ms === 'stopped' || ms === 'error') return;

  const sid = currentViewedSessionId;
  field.value = '';
  field.style.height = 'auto';
  document.getElementById('conv-send-btn').disabled = true;

  try {
    const resp = await fetch(`/api/sessions/${sid}/send`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });
    if (!resp.ok) {
      const data = await resp.json();
      alert(data.detail || 'Failed to send message');
    } else {
      // Poll for the response to appear (JSONL may take a moment to flush)
      let retries = 0;
      const pollForResponse = () => {
        if (sid !== currentViewedSessionId || retries > 10) return;
        retries++;
        _lastMsgCount = -1;
        refreshConversation(sid);
        setTimeout(pollForResponse, 1500);
      };
      setTimeout(pollForResponse, 1000);
    }
  } catch (e) {
    alert('Failed to send: ' + e.message);
  }
  document.getElementById('conv-send-btn').disabled = false;
}

async function sendQuickMessage(sessionId, text) {
  try {
    const resp = await fetch(`/api/sessions/${sessionId}/send`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });
    if (resp.ok) {
      // Poll for response
      let retries = 0;
      const poll = () => {
        if (sessionId !== currentViewedSessionId || retries > 10) return;
        retries++;
        _lastMsgCount = -1;
        refreshConversation(sessionId);
        setTimeout(poll, 1500);
      };
      setTimeout(poll, 1000);
    }
  } catch (e) { /* silent */ }
}

async function stopSession(sessionId) {

  machines.forEach(m => { if (m.hostname) machineSet.add(m.hostname); });
  machineSelect.innerHTML = [...machineSet].map(m =>
    `<option value="${esc(m)}">${esc(m)}</option>`
  ).join('');

  // Fetch projects
  projectSelect.innerHTML = '<option value="">Loading...</option>';
  modal.classList.add('open');

  try {
    const resp = await fetch('/api/projects');
    if (resp.ok) {
      const projects = await resp.json();
      if (projects.length > 0) {
        projectSelect.innerHTML = projects.map(p =>
          `<option value="${esc(p)}">${esc(p)}</option>`
        ).join('');
      } else {
        projectSelect.innerHTML = '<option value="">No projects found</option>';
      }
    }
  } catch (e) {
    projectSelect.innerHTML = '<option value="">Failed to load projects</option>';
  }
}

function closeNewSessionModal() {
  document.getElementById('new-session-modal').classList.remove('open');
}

async function submitNewSession() {
  const projectPath = document.getElementById('new-session-project').value;
  const machine = document.getElementById('new-session-machine').value;
  const prompt = document.getElementById('new-session-prompt').value.trim();
  const submitBtn = document.getElementById('new-session-submit');

  if (!projectPath) { alert('Please select a project'); return; }
  if (!prompt) { alert('Please enter an initial prompt'); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Launching...';

  try {
    const resp = await fetch('/api/sessions/new', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        project_path: projectPath,
        prompt: prompt,
        machine: machine || null,
      }),
    });
    const data = await resp.json();
    if (resp.ok && data.session_id) {
      closeNewSessionModal();
      // Subscribe to managed output and open the conversation
      managedStatuses[data.session_id] = data.managed_status;
      managedWaitingFor[data.session_id] = '';
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'subscribe_managed', session_id: data.session_id}));
      }
      // Small delay for session data to propagate
      setTimeout(() => openConversation(data.session_id), 500);
    } else {
      alert(data.detail || 'Failed to create session');
    }
  } catch (e) {
    alert('Failed to create session: ' + e.message);
  }

  submitBtn.disabled = false;
  submitBtn.textContent = 'Launch';
}

function updateConvInputBar() {
  const bar = document.getElementById('conv-input-bar');
  const actions = document.getElementById('conv-input-actions');
  const field = document.getElementById('conv-input-field');
  const sendBtn = document.getElementById('conv-send-btn');

  if (!currentViewedSessionId) {
    bar.classList.remove('visible');
    return;
  }

  const s = sessions.find(x => x.session_id === currentViewedSessionId);
  const isActive = s && s.is_active;
  const ms = managedStatuses[currentViewedSessionId];

  // Determine what to show
  const isManaged = ms && ms !== 'stopped' && ms !== 'error';

  // Not active and not managed: show resume button
  if (!isActive && !isManaged) {
    bar.classList.add('visible');
    let actionsHtml = '';
    actionsHtml += `<button class="conv-action-btn takeover" onclick="takeOverSession('${esc(currentViewedSessionId)}')">Resume Session</button>`;
    actions.innerHTML = actionsHtml;
    field.style.display = 'none';
    sendBtn.style.display = 'none';
    return;
  }

  bar.classList.add('visible');
  let actionsHtml = '';

  if (isManaged) {
    // Managed session: show status + input
    const dotClass = ms === 'waiting' ? 'waiting' : '';
    actionsHtml += `<span class="conv-managed-status"><span class="conv-managed-dot ${dotClass}"></span> Managed (${ms})</span>`;

    const wf = managedWaitingFor[currentViewedSessionId] || (s && s.waiting_for) || '';

    // Show approve/reject/comment buttons when waiting for plan approval
    if (ms === 'waiting' && wf === 'plan_approval') {
      actionsHtml += `<button class="conv-action-btn primary" onclick="sendQuickMessage('${esc(currentViewedSessionId)}','yes')">Approve Plan</button>`;
      actionsHtml += `<button class="conv-action-btn danger" onclick="sendQuickMessage('${esc(currentViewedSessionId)}','no')">Reject</button>`;
      actionsHtml += `<button class="conv-action-btn" onclick="focusPlanComment()">Comment</button>`;
    }

    // Show "Enter Plan Mode" button when waiting but not for plan approval
    if (ms === 'waiting' && wf !== 'plan_approval') {
      actionsHtml += `<button class="conv-action-btn plan-mode" onclick="sendQuickMessage('${esc(currentViewedSessionId)}','Please use plan mode. Create a plan first, then I will review it before you proceed.')">Enter Plan Mode</button>`;
    }

    actionsHtml += `<button class="conv-action-btn" onclick="interruptSession('${esc(currentViewedSessionId)}')">Interrupt</button>`;
    actionsHtml += `<button class="conv-action-btn danger" onclick="stopSession('${esc(currentViewedSessionId)}')">Stop</button>`;

    field.style.display = '';
    sendBtn.style.display = '';
    sendBtn.disabled = false;
  } else {
    // Unmanaged active session: show take-over button
    const unmanagedWf = (s && s.waiting_for) || '';
    if (unmanagedWf === 'plan_approval') {
      actionsHtml += `<span class="conv-managed-status"><span class="conv-managed-dot waiting"></span> Plan Awaiting Approval</span>`;
      actionsHtml += `<button class="conv-action-btn takeover" onclick="takeOverSession('${esc(currentViewedSessionId)}')">Take Over &amp; Review Plan</button>`;
    } else if (unmanagedWf === 'question') {
      actionsHtml += `<span class="conv-managed-status"><span class="conv-managed-dot waiting"></span> Waiting for Answer</span>`;
      actionsHtml += `<button class="conv-action-btn takeover" onclick="takeOverSession('${esc(currentViewedSessionId)}')">Take Over &amp; Answer</button>`;
    } else {
      actionsHtml += `<button class="conv-action-btn takeover" onclick="takeOverSession('${esc(currentViewedSessionId)}')">Take Over Session</button>`;
    }
    actionsHtml += `<button class="conv-action-btn" onclick="interruptSession('${esc(currentViewedSessionId)}')">Interrupt</button>`;
    actionsHtml += `<button class="conv-action-btn danger" onclick="stopSession('${esc(currentViewedSessionId)}')">Stop</button>`;
    field.style.display = 'none';
    sendBtn.style.display = 'none';
  }

  actions.innerHTML = actionsHtml;
}

// Input field auto-resize and Enter to send
(function() {
  const field = document.getElementById('conv-input-field');
  if (field) {
    field.addEventListener('input', () => {
      field.style.height = 'auto';
      field.style.height = Math.min(field.scrollHeight, 120) + 'px';
    });
    field.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendConvMessage();
      }
    });
  }
})();
</script>
